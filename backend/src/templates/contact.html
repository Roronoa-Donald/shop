<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau message - Angele Shop</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1a1a1a;
      margin: 0;
      padding: 0;
      color: #f8f9fa;
    }
    .container {
      max-width: 650px;
      margin: 30px auto;
      background: #2b2b2b;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.6);
      border: 1px solid #D4AF37;
    }
    .header {
      background: linear-gradient(135deg, #D4AF37, #B8941F);
      text-align: center;
      padding: 25px 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      color: #1a1a1a;
      font-weight: bold;
    }
    .header p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #333;
    }
    .content {
      padding: 25px 30px;
      background-color: #1a1a1a;
    }
    .content h2 {
      color: #D4AF37;
      margin-bottom: 20px;
      font-size: 22px;
      border-bottom: 1px solid #D4AF37;
      padding-bottom: 10px;
    }
    .info {
      margin-bottom: 15px;
    }
    .info strong {
      color: #D4AF37;
      display: inline-block;
      width: 100px;
    }
    .message-box {
      background-color: #2b2b2b;
      border: 1px solid #444;
      padding: 15px;
      border-radius: 6px;
      margin-top: 20px;
      color: #f8f9fa;
      font-size: 15px;
      line-height: 1.6;
    }
    .footer {
      text-align: center;
      padding: 15px;
      font-size: 13px;
      color: #aaa;
      border-top: 1px solid #333;
      background: #1a1a1a;
    }
    @media (max-width: 600px) {
      .content {
        padding: 15px;
      }
      .info strong {
        display: block;
        margin-bottom: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Angele Shop</h1>
      <p>📩 Nouveau message du formulaire de contact</p>
    </div>

    <div class="content">
      <h2>Détails du message</h2>
      <div class="info"><strong>Nom :</strong> {{name}}</div>
      <div class="info"><strong>Email :</strong> {{email}}</div>
      <div class="info"><strong>Téléphone :</strong> {{phone}}</div>
      <div class="info"><strong>Sujet :</strong> {{subject}}</div>

      <div class="message-box">
        {{message}}
      </div>
    </div>

    <div class="footer">
      Angele Shop - Boutique de luxe<br>
      Cet email a été généré automatiquement par le formulaire de contact.
    </div>
  </div>
</body>
</html>
